spring:
  datasource:
    url: jdbc:mysql://localhost:3306/triplog?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

jwt:
  secret: your-jwt-secret-key-change-this
  expiration: 86400000

file:
  upload-dir: ./uploads

server:
  port: 8080
