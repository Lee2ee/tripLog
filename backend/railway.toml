[build]
builder = "nixpacks"
buildCommand = "./gradlew bootJar -x test"

[deploy]
startCommand = "java -Dspring.profiles.active=prod -jar build/libs/backend-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/api/auth/admin/login"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
